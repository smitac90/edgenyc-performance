name: Daily CWV Field Snapshot

on:
  schedule:
    - cron: "0 15 * * *" # 15:00 UTC daily (approx 10:00 AM ET)
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  cwv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: Sync with remote
        run: git pull --rebase

      - name: Run CWV snapshot (CrUX)
        env:
          OUT_DIR: data
          CRUX_API_KEY: ${{ secrets.CRUX_API_KEY }}
        run: node scripts/edgenyc-cwv-daily.mjs

      - name: Check CWV thresholds
        id: cwv_alerts
        run: node scripts/edgenyc-cwv-alerts.mjs

      - name: Create issue if CWV alerts
        if: steps.cwv_alerts.outputs.has_cwv_alerts == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "CWV field data alert"
          content-filepath: reports/cwv-alerts.md
          labels: performance,cwv,alert

      - name: Close resolved CWV alert issues
        if: steps.cwv_alerts.outputs.has_cwv_alerts != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --label cwv --label alert --state open --json number \
            --jq '.[].number' | while read -r issue; do
            gh issue close "$issue" \
              --comment "All CWV field metrics are back within Good thresholds. Auto-closing."
          done

      - name: Commit data + alerts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily cwv snapshot"
          file_pattern: "data/*.csv reports/cwv-alerts.md"
