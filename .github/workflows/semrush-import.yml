name: Semrush Pages Import

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: Sync with remote
        run: git pull --rebase

      - name: Run Semrush import
        run: node scripts/edgenyc-semrush-import-pages.mjs

      - name: Commit data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: semrush pages import"
          file_pattern: "data/*.csv data/semrush-archive/*"
